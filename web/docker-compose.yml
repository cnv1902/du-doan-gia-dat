
services:
  mongodb:
    image: mongo:latest
    container_name: land_pricing_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: land_pricing_backend
    working_dir: /app
    ports:
      - "8080:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/land-pricing
      - DATA_DIR=/frontend/public/data
    volumes:
      - ./backend:/app
      - ./frontend/public/data:/frontend/public/data:ro
      - frontend_dist:/frontend/dist:ro
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: land_pricing_frontend
    working_dir: /app
    volumes:
      - frontend_dist:/app/dist
    environment:
      - VITE_API_URL=
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  frontend_dist:
